<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎰 Bachelor Spin — Vegas Edition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #FFD700;
      --gold-deep: #B8860B;
      --pink: #FF2D95;
      --cyan: #00E5FF;
      --bg-1: #0d0016;
      --bg-2: #1a0030;
    }

    html, body { height: 100%; }

    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,45,149,0.18), transparent 60%),
        radial-gradient(ellipse 70% 50% at 85% 100%, rgba(0,229,255,0.10), transparent 60%),
        radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg-1) 70%, #060009 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px 10px 40px;
      font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* floating light specks */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 12% 20%, rgba(255,215,0,0.5), transparent 60%),
        radial-gradient(2px 2px at 80% 12%, rgba(255,45,149,0.5), transparent 60%),
        radial-gradient(1.5px 1.5px at 30% 75%, rgba(0,229,255,0.5), transparent 60%),
        radial-gradient(2px 2px at 65% 60%, rgba(255,255,255,0.35), transparent 60%),
        radial-gradient(1.5px 1.5px at 90% 80%, rgba(255,215,0,0.4), transparent 60%),
        radial-gradient(1.5px 1.5px at 45% 35%, rgba(255,45,149,0.35), transparent 60%);
      animation: twinkle 3.5s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.35; } to { opacity: 1; } }

    .stage {
      display: flex;
      align-items: flex-start;
      width: 100%;
      max-width: 480px;
      gap: 8px;
    }

    /* ============ CABINET ============ */
    .machine {
      flex: 1;
      min-width: 0;
      background: linear-gradient(180deg, #2b0a45 0%, #1b0530 55%, #12021f 100%);
      border-radius: 28px;
      border: 3px solid var(--gold);
      padding: 18px 14px 24px;
      position: relative;
      box-shadow:
        0 0 30px rgba(255,45,149,0.35),
        0 0 70px rgba(0,229,255,0.15),
        0 0 120px rgba(255,215,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -8px 24px rgba(0,0,0,0.6);
      animation: cabinetGlow 4s ease-in-out infinite;
      -webkit-user-select: none;
      user-select: none;
    }

    @keyframes cabinetGlow {
      0%, 100% {
        box-shadow:
          0 0 30px rgba(255,45,149,0.40),
          0 0 70px rgba(0,229,255,0.12),
          0 0 120px rgba(255,215,0,0.10),
          inset 0 1px 0 rgba(255,255,255,0.18),
          inset 0 -8px 24px rgba(0,0,0,0.6);
      }
      50% {
        box-shadow:
          0 0 30px rgba(0,229,255,0.35),
          0 0 70px rgba(255,45,149,0.18),
          0 0 120px rgba(255,215,0,0.16),
          inset 0 1px 0 rgba(255,255,255,0.18),
          inset 0 -8px 24px rgba(0,0,0,0.6);
      }
    }

    .machine.win-anim {
      animation: winPulse 0.45s 6;
    }
    @keyframes winPulse {
      0%, 100% { transform: none; filter: none; }
      50% {
        transform: scale(1.012);
        filter: brightness(1.25);
      }
    }

    .bolt {
      position: absolute;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFE066, #8B6914);
      border: 1px solid #6b5210;
      box-shadow: 0 0 6px rgba(255,215,0,0.6);
    }
    .bolt.tl { top: 11px; left: 11px; }
    .bolt.tr { top: 11px; right: 11px; }
    .bolt.bl { bottom: 11px; left: 11px; }
    .bolt.br { bottom: 11px; right: 11px; }

    /* ============ MARQUEE SIGN ============ */
    .sign {
      background: linear-gradient(180deg, #12001f, #24063d);
      border: 2px solid rgba(255,215,0,0.6);
      border-radius: 16px;
      padding: 8px 6px 10px;
      margin-bottom: 14px;
      box-shadow: inset 0 0 18px rgba(0,0,0,0.8), 0 0 14px rgba(255,215,0,0.15);
    }

    .bulb-row {
      display: flex;
      justify-content: space-between;
      padding: 0 8px;
    }
    .bulb-row + .title { margin-top: 6px; }

    .bulb {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3a2a00;
      box-shadow: inset 0 0 2px #000;
    }
    .bulb.lit {
      background: radial-gradient(circle at 35% 35%, #fffbe0, var(--gold));
      box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(255,215,0,0.6);
    }
    .bulb.lit.alt {
      background: radial-gradient(circle at 35% 35%, #ffe0f0, var(--pink));
      box-shadow: 0 0 8px var(--pink), 0 0 16px rgba(255,45,149,0.6);
    }

    .title {
      text-align: center;
      font-size: 21px;
      letter-spacing: 4px;
      color: var(--gold);
      margin: 6px 0;
      text-shadow:
        0 0 6px rgba(255,215,0,0.9),
        0 0 18px rgba(255,215,0,0.65),
        0 0 40px rgba(255,140,0,0.45),
        0 2px 3px rgba(0,0,0,0.9);
      animation: neonFlicker 6s linear infinite;
    }
    .title .accent {
      color: var(--pink);
      text-shadow:
        0 0 6px rgba(255,45,149,0.95),
        0 0 18px rgba(255,45,149,0.7),
        0 0 40px rgba(255,45,149,0.5),
        0 2px 3px rgba(0,0,0,0.9);
    }

    @keyframes neonFlicker {
      0%, 100% { opacity: 1; }
      3% { opacity: 0.6; }
      3.5% { opacity: 1; }
      52% { opacity: 1; }
      52.5% { opacity: 0.7; }
      53% { opacity: 1; }
      53.5% { opacity: 0.8; }
      54% { opacity: 1; }
    }

    /* ============ MODE BAR ============ */
    .mode-bar {
      display: flex;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(0,229,255,0.55);
      border-radius: 30px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 0 12px rgba(0,229,255,0.25), inset 0 0 10px rgba(0,0,0,0.8);
    }

    .mode-btn {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      color: rgba(0,229,255,0.65);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      background: linear-gradient(180deg, #33f1ff, #00b8d4);
      color: #002233;
      border-radius: 28px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
      box-shadow: 0 0 14px rgba(0,229,255,0.7);
    }

    /* ============ REELS ============ */
    .reels-frame {
      background: linear-gradient(180deg, #05000a 0%, #10041c 100%);
      border: 3px solid;
      border-image: linear-gradient(135deg, #d8d8d8, #6a6a6a, #eee, #555) 1;
      border-radius: 14px;
      padding: 12px 10px;
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      box-shadow:
        inset 0 4px 22px rgba(0,0,0,0.95),
        0 0 16px rgba(255,45,149,0.2),
        0 2px 10px rgba(0,0,0,0.6);
      position: relative;
    }

    .reel-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    .reel-window {
      width: 100%;
      height: 100px;
      overflow: hidden;
      position: relative;
      border-radius: 12px;
      border: 2px solid #3a3a4a;
      background: linear-gradient(180deg, #0a0012 0%, #170526 100%);
    }

    /* glass reflection */
    .reel-window .glass {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 11;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.10) 42%, rgba(255,255,255,0.03) 55%, transparent 60%);
      border-radius: 10px;
    }

    .reel-window::before,
    .reel-window::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 26px;
      z-index: 10;
      pointer-events: none;
    }
    .reel-window::before {
      top: 0;
      background: linear-gradient(180deg, rgba(5,0,10,0.95) 0%, transparent 100%);
    }
    .reel-window::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(5,0,10,0.95) 0%, transparent 100%);
    }

    .reel-strip {
      position: absolute;
      width: 100%;
      will-change: transform;
    }

    .reel-item {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reel-symbol {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, #FF8C00 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow:
        0 3px 10px rgba(0,0,0,0.7),
        0 0 0 2px rgba(255,215,0,0.35),
        0 0 10px rgba(255,215,0,0.25);
      overflow: hidden;
    }

    .reel-symbol img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    @keyframes reelGlow {
      0%, 100% { border-color: #3a3a4a; }
      50% { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,229,255,0.4); }
    }
    .reel-window.spinning { animation: reelGlow 0.25s infinite; }

    /* ============ SPIN BUTTON ============ */
    .spin-btn {
      width: 100%;
      padding: 19px;
      background: linear-gradient(180deg, #FFE566 0%, #FFB700 45%, #E07B00 100%);
      border: none;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 900;
      font-family: inherit;
      color: #3a0000;
      cursor: pointer;
      letter-spacing: 4px;
      box-shadow:
        0 6px 0 #7a3a00,
        0 8px 26px rgba(255, 140, 0, 0.5),
        0 0 40px rgba(255, 215, 0, 0.2);
      transition: all 0.1s;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255,255,255,0.3);
      position: relative;
      top: 0;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* sheen sweep */
    .spin-btn::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 40%;
      left: -60%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: sheen 2.8s ease-in-out infinite;
    }
    @keyframes sheen {
      0%, 60% { left: -60%; }
      100% { left: 130%; }
    }

    .spin-btn:active:not(:disabled) {
      top: 5px;
      box-shadow:
        0 1px 0 #7a3a00,
        0 3px 10px rgba(255, 140, 0, 0.3);
    }
    .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ============ RESULT ============ */
    .result-box {
      margin-top: 15px;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,45,149,0.45);
      border-radius: 12px;
      padding: 15px 12px;
      color: var(--gold);
      font-size: 14px;
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1.5;
      box-shadow: inset 0 0 16px rgba(0,0,0,0.7), 0 0 12px rgba(255,45,149,0.15);
    }

    .result-box .challenge-title { font-size: 15px; font-weight: 900; }
    .result-box .challenge-detail { font-size: 11px; color: #ffcc66; font-weight: normal; }

    .challenge-level {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .level-1 { background: #1fae4b; color: #fff; box-shadow: 0 0 8px rgba(31,174,75,0.6); }
    .level-2 { background: #d78f00; color: #fff; box-shadow: 0 0 8px rgba(215,143,0,0.6); }
    .level-3 { background: #e01e3c; color: #fff; box-shadow: 0 0 8px rgba(224,30,60,0.7); }

    /* ============ HISTORY ============ */
    .history {
      margin-top: 12px;
    }
    .history-toggle {
      width: 100%;
      background: none;
      border: 1px solid rgba(0,229,255,0.35);
      border-radius: 10px;
      color: rgba(0,229,255,0.85);
      font-family: inherit;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
      padding: 8px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .history-toggle:active { opacity: 0.7; }

    .history-list {
      display: none;
      margin-top: 8px;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 10px;
      padding: 8px;
    }
    .history.open .history-list { display: block; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      color: #eee;
      font-size: 11px;
      font-weight: normal;
      font-family: Arial, sans-serif;
      line-height: 1.35;
      text-align: left;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .h-time { color: rgba(0,229,255,0.7); font-size: 10px; flex-shrink: 0; }
    .history-item .h-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .h-dot.level-1 { background: #1fae4b; }
    .h-dot.level-2 { background: #d78f00; }
    .h-dot.level-3 { background: #e01e3c; }
    .history-empty { color: rgba(255,255,255,0.4); font-size: 11px; text-align: center; padding: 6px; font-family: Arial; }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 380px) {
      body { padding: 8px 6px 24px; }
      .machine { padding: 12px 9px 18px; border-radius: 20px; }
      .title { font-size: 16px; letter-spacing: 2px; }
      .mode-btn { font-size: 11px; padding: 8px 0; }
      .reels-frame { padding: 6px 4px; gap: 4px; margin-bottom: 12px; }
      .reel-symbol { width: 44px; height: 44px; }
      .spin-btn { padding: 15px; font-size: 18px; letter-spacing: 3px; }
      .result-box { padding: 10px 8px; min-height: 60px; }
      .result-box .challenge-title { font-size: 13px; }
      .result-box .challenge-detail { font-size: 10px; }
    }

    @supports (min-height: 100dvh) {
      body { min-height: 100dvh; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      body { padding: 8px 12px; align-items: center; }
      .stage { max-width: 580px; }
      .machine { padding: 10px 12px 16px; }
      .title { font-size: 15px; margin: 3px 0; }
      .sign { padding: 5px 6px 7px; margin-bottom: 8px; }
      .mode-bar { margin-bottom: 8px; }
      .mode-btn { padding: 6px 0; font-size: 11px; }
      .reels-frame { margin-bottom: 8px; padding: 6px; }
      .reel-window { height: 80px; }
      .reel-item { height: 80px; }
      .reel-symbol { width: 56px; height: 56px; }
      .spin-btn { padding: 11px; font-size: 17px; }
      .result-box { margin-top: 8px; padding: 8px; min-height: 48px; }
      .result-box .challenge-title { font-size: 12px; }
    }

    @media (hover: none) {
      .spin-btn:active:not(:disabled) { transform: scale(0.97); }
      .mode-btn:active { opacity: 0.7; }
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="machine" id="machine">
    <div class="bolt tl"></div>
    <div class="bolt tr"></div>
    <div class="bolt bl"></div>
    <div class="bolt br"></div>

    <div class="sign">
      <div class="bulb-row" id="bulbsTop"></div>
      <div class="title">🎰 BACHELOR <span class="accent">SPIN</span> 🎰</div>
      <div class="bulb-row" id="bulbsBottom"></div>
    </div>

    <div class="mode-bar">
      <div class="mode-btn active" id="btn-daily" onclick="setMode('daily')">☀️ QUOTIDIANO</div>
      <div class="mode-btn" id="btn-party" onclick="setMode('party')">🎉 SERATA</div>
    </div>

    <div class="reels-frame">
      <div class="reel-col">
        <div class="reel-window" id="reel-0">
          <div class="reel-strip" id="strip-0"></div>
          <div class="glass"></div>
        </div>
      </div>
      <div class="reel-col">
        <div class="reel-window" id="reel-1">
          <div class="reel-strip" id="strip-1"></div>
          <div class="glass"></div>
        </div>
      </div>
      <div class="reel-col">
        <div class="reel-window" id="reel-2">
          <div class="reel-strip" id="strip-2"></div>
          <div class="glass"></div>
        </div>
      </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 SPIN!</button>

    <div class="result-box" id="resultBox">Premi SPIN per giocare!</div>

    <div class="history" id="history">
      <button class="history-toggle" onclick="toggleHistory()">📜 STORICO SFIDE</button>
      <div class="history-list" id="historyList">
        <div class="history-empty">Nessuna sfida ancora estratta</div>
      </div>
    </div>
  </div>
</div>

<script>
  const REPEATS = 9;

  // Compute reel item height dynamically (matches CSS .reel-item height)
  function getItemH() {
    if (window.matchMedia('(max-height: 500px) and (orientation: landscape)').matches) return 80;
    return 100;
  }
  let ITEM_H = getItemH();
  window.addEventListener('resize', () => { ITEM_H = getItemH(); });

  // ID usati per combo speciali (triplo)
  const CONTE_IDX   = 0;

      { prova: 'Scegli un compagno e i due vostri rivali', sport: 'Ruba bandiera', note: 'Prova a squadre 2 vs 2', livello: 1, peso: 3 },
      { prova: 'Scegli un compagno e i due vostri rivali', sport: 'Schiaccia sette', note: 'Prova a squadre 2 vs 2', livello: 1, peso: 3 },
      { prova: 'Detona la bomba', sport: null, note: 'Scegli chi ha 15 min per nascondere un oggetto; poi 5 min per trovarlo', livello: 1, peso: 3 },
      { prova: 'Regole per i prossimi 15 minuti', sport: null, note: 'Non puoi dire "sì"', livello: 1, peso: 3 },
      { prova: 'Regole per i prossimi 15 minuti', sport: null, note: 'Non puoi usare intercalari', livello: 1, peso: 3 },
      { prova: 'Regole per i prossimi 15 minuti', sport: null, note: 'Non puoi usare parole che finiscono in "a"', livello: 1, peso: 3 },
      { prova: 'Chiudi ogni frase con "dio boh"', sport: null, note: 'Per i prossimi 15 minuti', livello: 1, peso: 3 }
    ]
  };

  let currentMode = 'daily';
  let isSpinning = false;

  // ---------- weighted random ----------

  function pickWeightedChallenge(mode) {
    const list = challenges[mode];
    const totalWeight = list.reduce((s, c) => s + c.peso, 0);
    let r = Math.random() * totalWeight;
    for (const c of list) {
      r -= c.peso;
      if (r <= 0) return c;
    }
    return list[list.length - 1];
  }

  // ---------- helpers ----------

  function makeItemEl(item) {
    const div = document.createElement('div');
    div.className = 'reel-item';
    div.innerHTML = `<div class="reel-symbol"><img src="${item.img}" alt="${item.label}"></div>`;
    return div;
  }

  function buildStrip(stripEl, items, count) {
    stripEl.innerHTML = '';
    for (let r = 0; r < count; r++) {
      items.forEach(item => stripEl.appendChild(makeItemEl(item)));
    }
  }

  // ---------- marquee bulbs ----------

  const BULB_COUNT = 14;
  let bulbOffset = 0;
  let bulbSpeed = 320;

  function initBulbs() {
    ['bulbsTop', 'bulbsBottom'].forEach(id => {
      const row = document.getElementById(id);
      row.innerHTML = '';
      for (let i = 0; i < BULB_COUNT; i++) {
        const b = document.createElement('div');
        b.className = 'bulb';
        row.appendChild(b);
      }
    });
    bulbTick();
  }

  function bulbTick() {
    bulbOffset++;
    ['bulbsTop', 'bulbsBottom'].forEach((id, rowIdx) => {
      const bulbs = document.getElementById(id).children;
      for (let i = 0; i < bulbs.length; i++) {
        const lit = (i + bulbOffset + rowIdx) % 3 === 0;
        bulbs[i].className = 'bulb' + (lit ? ' lit' : '') + (lit && (i + rowIdx) % 2 ? ' alt' : '');
      }
    });
    setTimeout(bulbTick, bulbSpeed);
  }

  // ---------- init ----------

  function initReels() {
    for (let i = 0; i < 3; i++) {
      const strip = document.getElementById('strip-' + i);
      buildStrip(strip, caricatures, 1);
      strip.style.transition = 'none';
      strip.style.transform  = 'translateY(0)';
    }
  }

  function setMode(mode) {
    if (isSpinning) return;
    currentMode = mode;
    document.getElementById('btn-daily').classList.toggle('active', mode === 'daily');
    document.getElementById('btn-party').classList.toggle('active', mode === 'party');
    initReels();
    document.getElementById('resultBox').textContent = 'Premi SPIN per giocare!';
    document.getElementById('machine').classList.remove('win-anim');
  }

  // ---------- spin ----------

  function spinReel(reelIdx, finalIndex, durationMs, onDone) {
    const strip = document.getElementById('strip-' + reelIdx);
    const winEl = document.getElementById('reel-' + reelIdx);

    buildStrip(strip, caricatures, REPEATS);
    strip.style.transition = 'none';
    strip.style.transform  = 'translateY(0)';

    const targetY = (REPEATS - 1) * caricatures.length * ITEM_H + finalIndex * ITEM_H;

    winEl.classList.add('spinning');
    strip.getBoundingClientRect();

    strip.style.transition = `transform ${durationMs}ms cubic-bezier(0.05, 0.9, 0.1, 1.0)`;
    strip.style.transform  = `translateY(-${targetY}px)`;

    setTimeout(() => {
      winEl.classList.remove('spinning');
      buildStrip(strip, caricatures, 1);
      strip.style.transition = 'none';
      strip.style.transform  = `translateY(-${finalIndex * ITEM_H}px)`;
      if (onDone) onDone();
    }, durationMs + 60);
  }

  function spin() {
    if (isSpinning) return;
    isSpinning = true;

    const btn     = document.getElementById('spinBtn');
    const machine = document.getElementById('machine');
    btn.disabled  = true;
    machine.classList.remove('win-anim');

    bulbSpeed = 90; // marquee lights race during spin

    if (navigator.vibrate) navigator.vibrate(40);

    // Pick the challenge BEFORE spinning (weighted random)
    const challenge = pickWeightedChallenge(currentMode);

    // If special triple combo, force all 3 reels on that character
    let indices;
    if (challenge.tripleIdx !== undefined) {
      indices = [challenge.tripleIdx, challenge.tripleIdx, challenge.tripleIdx];
    } else {
      indices = [0, 1, 2].map(() => Math.floor(Math.random() * caricatures.length));
    }
    const durations = [5000, 5600, 6200];

    startSpinMusic();
    let doneCount = 0;

    indices.forEach((idx, reelIdx) => {
      spinReel(reelIdx, idx, durations[reelIdx], () => {
        doneCount++;
        if (doneCount === 3) {
          stopSpinMusic();
          playWinSound();
          bulbSpeed = 320;

          // Build result text
          let title = challenge.prova + (challenge.sport ? ' — ' + challenge.sport : '');
          let html = `<div class="challenge-title">🎯 ${title}</div>`;
          if (challenge.note) html += `<div class="challenge-detail">${challenge.note}</div>`;

          const levelLabels = { 1: 'FACILE', 2: 'MEDIO', 3: 'ESTREMO' };
          html += `<span class="challenge-level level-${challenge.livello}">${levelLabels[challenge.livello]}</span>`;

          document.getElementById('resultBox').innerHTML = html;
          machine.classList.add('win-anim');

          if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 150]);

          addToHistory(challenge);

          btn.disabled = false;
          isSpinning = false;
        }
      });
    });
  }

  // ---------- history ----------

  const historyEntries = [];
  const MAX_HISTORY = 20;

  function addToHistory(challenge) {
    const now = new Date();
    const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    let text = challenge.prova + (challenge.sport ? ' — ' + challenge.sport : '');
    historyEntries.unshift({ time, text, livello: challenge.livello, mode: currentMode });
    if (historyEntries.length > MAX_HISTORY) historyEntries.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!historyEntries.length) {
      list.innerHTML = '<div class="history-empty">Nessuna sfida ancora estratta</div>';
      return;
    }
    list.innerHTML = historyEntries.map(h => `
      <div class="history-item">
        <span class="h-dot level-${h.livello}"></span>
        <span class="h-time">${h.time}</span>
        <span>${h.mode === 'party' ? '🎉' : '☀️'} ${h.text}</span>
      </div>`).join('');
  }

  function toggleHistory() {
    document.getElementById('history').classList.toggle('open');
  }

  // ---------- audio ----------

  let audioCtx = null;
  let spinAudioNodes = [];

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function startSpinMusic() {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    spinAudioNodes = [];

    // Percussive tick loop
    const tickGain = ctx.createGain();
    tickGain.gain.value = 0.12;
    tickGain.connect(ctx.destination);
    let tickRunning = true;

    function tick() {
      if (!tickRunning) return;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = 800 + Math.random() * 600;
      env.gain.setValueAtTime(0.3, ctx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      osc.connect(env);
      env.connect(tickGain);
      osc.start();
      osc.stop(ctx.currentTime + 0.05);
      setTimeout(tick, 80 + Math.random() * 40);
    }
    tick();

    // Bass groove
    const bassGain = ctx.createGain();
    bassGain.gain.value = 0.15;
    bassGain.connect(ctx.destination);
    let bassRunning = true;
    const bassNotes = [110, 130.81, 146.83, 130.81, 110, 98, 110, 130.81];
    let bassIdx = 0;

    function bassNote() {
      if (!bassRunning) return;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = bassNotes[bassIdx % bassNotes.length];
      bassIdx++;
      env.gain.setValueAtTime(0.25, ctx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.connect(env);
      env.connect(bassGain);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
      setTimeout(bassNote, 300);
    }
    bassNote();

    // Melody — casino jingle
    const melodyGain = ctx.createGain();
    melodyGain.gain.value = 0.08;
    melodyGain.connect(ctx.destination);
    let melodyRunning = true;
    const melodyNotes = [523.25, 659.25, 783.99, 659.25, 587.33, 523.25, 493.88, 523.25,
                         659.25, 783.99, 880, 783.99, 659.25, 587.33, 523.25, 493.88];
    let melodyIdx = 0;

    function melodyNote() {
      if (!melodyRunning) return;
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = melodyNotes[melodyIdx % melodyNotes.length];
      melodyIdx++;
      env.gain.setValueAtTime(0.2, ctx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.connect(env);
      env.connect(melodyGain);
      osc.start();
      osc.stop(ctx.currentTime + 0.2);
      setTimeout(melodyNote, 200);
    }
    melodyNote();

    spinAudioNodes.push(
      () => { tickRunning = false; },
      () => { bassRunning = false; },
      () => { melodyRunning = false; }
    );
  }

  function stopSpinMusic() {
    spinAudioNodes.forEach(stop => stop());
    spinAudioNodes = [];
  }

  function playWinSound() {
    const ctx = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.45);
    });
  }

  // ---------- boot ----------
  initReels();
  initBulbs();
</script>
</body>
</html>
